  #         rc-wording: "RELEASE,alpha"

  publish-npm:
    # needs: [build, versioning]
    runs-on: ubuntu-latest
    # Required for npm Trusted Publishing (OIDC): npm exchanges this short-lived
    # GitHub OIDC token for publish credentials, so no npm token is needed and
    # the package's 2FA-on-publish requirement is satisfied. The package must
    # have this repo + workflow configured as a Trusted Publisher on npmjs.org.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org/
      # OIDC trusted publishing needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: npm publish --access public
